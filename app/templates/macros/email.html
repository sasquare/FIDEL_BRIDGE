{% macro cta_button(url, label) %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0;">
  <tr>
    <td style="border-radius:8px;background-color:#193d6d;">
      <a href="{{ url }}" style="display:inline-block;padding:14px 28px;color:#ffffff;font-size:15px;font-weight:bold;text-decoration:none;border-radius:8px;">{{ label }}</a>
    </td>
  </tr>
</table>
{% endmacro %}

{% macro checklist(items) %}
<ul style="margin:16px 0;padding:0;list-style:none;">
  {% for item in items %}
  <li style="margin:0 0 10px;padding-left:26px;position:relative;color:#122c50;">
    <span style="position:absolute;left:0;">&#9989;</span>{{ item.label }}
  </li>
  {% endfor %}
</ul>
{% endmacro %}
