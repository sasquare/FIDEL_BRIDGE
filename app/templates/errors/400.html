{% extends "base.html" %}
{% block title %}Bad Request — FidelBridge{% endblock %}
{% block content %}
<section class="section flex flex-col items-center py-32 text-center">
  <span class="eyebrow">Error 400</span>
  <h1 class="mt-3 text-4xl font-extrabold text-brand-900">That request couldn't be processed.</h1>
  <p class="mt-4 max-w-md text-slate-600">
    Something about this request wasn't valid. Please go back and try again.
  </p>
  <a href="{{ url_for('main.index') }}" class="btn-primary mt-8">Back to Home</a>
</section>
{% endblock %}
