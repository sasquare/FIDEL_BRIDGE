{% extends "base.html" %}
{% block title %}Too Many Requests — FidelBridge{% endblock %}
{% block content %}
<section class="section flex flex-col items-center py-32 text-center">
  <span class="eyebrow">Error 429</span>
  <h1 class="mt-3 text-4xl font-extrabold text-brand-900">You're going a bit too fast.</h1>
  <p class="mt-4 max-w-md text-slate-600">
    Too many attempts in a short time. Please wait a moment and try again.
  </p>
  <a href="{{ url_for('main.index') }}" class="btn-primary mt-8">Back to Home</a>
</section>
{% endblock %}
