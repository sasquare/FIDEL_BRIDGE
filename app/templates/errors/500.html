{% extends "base.html" %}
{% block title %}Something Went Wrong — FidelBridge{% endblock %}
{% block content %}
<section class="section flex flex-col items-center py-32 text-center">
  <span class="eyebrow">Error 500</span>
  <h1 class="mt-3 text-4xl font-extrabold text-brand-900">Something went wrong on our end.</h1>
  <p class="mt-4 max-w-md text-slate-600">
    Our team has been notified. Please try again in a few minutes.
  </p>
  <a href="{{ url_for('main.index') }}" class="btn-primary mt-8">Back to Home</a>
</section>
{% endblock %}
