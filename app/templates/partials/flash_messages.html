{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div
      x-data="{ show: true }"
      x-show="show"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 -translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="mx-auto max-w-7xl px-6 pt-4 lg:px-8"
    >
      {% for category, message in messages %}
        <div
          class="mb-3 flex items-start justify-between gap-4 rounded-xl border px-4 py-3 text-sm
            {{ 'border-emerald-200 bg-emerald-50 text-emerald-800' if category == 'success'
               else 'border-red-200 bg-red-50 text-red-800' if category == 'error'
               else 'border-brand-200 bg-brand-50 text-brand-800' }}"
        >
          <span>{{ message }}</span>
          <button @click="show = false" class="shrink-0 font-semibold opacity-60 hover:opacity-100" aria-label="Dismiss">
            &times;
          </button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
