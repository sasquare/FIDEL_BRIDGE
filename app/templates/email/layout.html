<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}FidelBridge{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#eef4fb;font-family:Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#eef4fb;padding:24px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#ffffff;border-radius:12px;overflow:hidden;">
        <tr>
          <td style="background-color:#0b1c33;padding:24px 32px;">
            <span style="color:#ffffff;font-size:20px;font-weight:bold;">FidelBridge</span>
          </td>
        </tr>
        <tr>
          <td style="padding:32px;color:#122c50;font-size:15px;line-height:1.6;">
            {% block content %}{% endblock %}
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px;background-color:#f4f7fb;color:#64748b;font-size:12px;line-height:1.5;">
            {% block footer %}
            <p style="margin:0;">Thank you for choosing FidelBridge.</p>
            <p style="margin:8px 0 0;">The FidelBridge Team</p>
            {% endblock %}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
