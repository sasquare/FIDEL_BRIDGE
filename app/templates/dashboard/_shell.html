{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-7xl px-6 py-10 lg:px-8">
  <div class="grid gap-8 lg:grid-cols-[240px_1fr]">
    <aside class="flex flex-wrap gap-2 lg:sticky lg:top-24 lg:flex-col lg:flex-nowrap lg:self-start">
      {% for item in sidebar_items %}
      <a
        href="{{ item.url }}"
        class="flex shrink-0 items-center gap-2 rounded-xl px-4 py-2.5 text-sm font-semibold transition
          {{ 'bg-brand-700 text-white shadow-card' if item.key == active else 'text-slate-600 hover:bg-slate-100' }}"
      >
        {{ item.label }}
      </a>
      {% endfor %}
      <a
        href="{{ url_for('auth.logout') }}"
        class="flex shrink-0 items-center gap-2 rounded-xl px-4 py-2.5 text-sm font-semibold text-red-600 transition hover:bg-red-50 lg:mt-4"
      >
        Log Out
      </a>
    </aside>

    <div class="min-w-0">
      {% block dashboard_content %}{% endblock %}
    </div>
  </div>
</section>
{% endblock %}
