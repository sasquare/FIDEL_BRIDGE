# Render Blueprint — see https://render.com/docs/blueprint-spec
#
# Deploys FidelBridge as a single web service backed by a managed
# PostgreSQL database. To use it: push this repo to GitHub, then in the
# Render dashboard choose "New +" -> "Blueprint" and point it at the repo.
# Render reads this file and provisions everything below automatically.
services:
  - type: web
    name: fidelbridge
    runtime: python
    plan: free
    region: oregon
    branch: main
    # No Node/npm step here: the compiled CSS (app/static/css/output.css),
    # vendored Alpine.js, and vendored fonts are committed straight into
    # the repo (see git history), not generated at deploy time - so the
    # build only needs Python. Run `npm run build` locally and commit the
    # result whenever app/static/src/input.css or tailwind.config.js change.
    buildCommand: >-
      pip install -r requirements.txt &&
      flask db upgrade &&
      flask seed-categories
    startCommand: gunicorn wsgi:app --workers 2 --timeout 60
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: fidelbridge-db
          property: connectionString
      # Outbound email (password reset). sync: false means Render prompts
      # for these in the dashboard instead of storing them in this file -
      # appropriate since they're provider credentials, not build config.
      # Until set, app/utils/mail.py logs reset emails instead of sending
      # them, so the app still runs without these.
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      # Cloudflare R2 (durable file storage - see app/utils/storage.py).
      # sync: false means Render prompts for these in the dashboard rather
      # than storing them here. Until all three are set, uploads fall back
      # to local disk, which does not survive a redeploy on this plan.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: fidelbridge-files
      # Absolute base URL used only for links inside profile-completion
      # campaign emails (app/utils/profile_emails.py) sent from the
      # `flask send-profile-completion-reminders` CLI job, which runs
      # outside any HTTP request and so has no Host header to infer this
      # from. Set to whatever your live domain actually resolves to
      # (fidelbridge.com once DNS is confirmed, or the onrender.com URL
      # otherwise).
      - key: APP_BASE_URL
        sync: false
      # `flask send-profile-completion-reminders` sends any due day-3/7/14
      # profile completion reminder emails - see app/utils/profile_emails.py.
      # It's a one-off CLI command, not scheduled by this Blueprint: add a
      # Render Cron Job service pointing at it (if available on your plan),
      # or trigger it from any external scheduler (e.g. a scheduled GitHub
      # Action running `flask send-profile-completion-reminders` against
      # this service). It's safe to run on any cadence - re-running never
      # sends a duplicate.

databases:
  - name: fidelbridge-db
    plan: free
    databaseName: fidelbridge
    user: fidelbridge
